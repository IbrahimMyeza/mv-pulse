<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: #0d1117; color: #f5f7fa; padding: 18px; }
        .shell { max-width: 860px; margin: 0 auto; display: grid; gap: 16px; }
        .card, .item { background: rgba(17,24,32,0.94); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 18px; }
        p { color: #9aa6b5; line-height: 1.5; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 16px; border-radius: 16px; background: linear-gradient(135deg, #1bd1a5 0%, #ff8f5a 100%); color: #071118; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="shell">
        <a class="btn" href="/feed">Back to feed</a>
        <section class="card">
            <h1>Notifications</h1>
            <p>Replies, follows, and thread updates land here.</p>
        </section>
        {% for item in notifications %}
        <section class="item">
            <strong>{{ item.message }}</strong>
            <p>{{ item.kind }} · {{ item.created_at }}</p>
            {% if item.video_id %}<a class="btn" href="/video/{{ item.video_id }}">Open video</a>{% endif %}
        </section>
        {% else %}
        <section class="card"><p>No notifications yet.</p></section>
        {% endfor %}
    </div>
</body>
</html>
