services:
  - type: web
    name: mv-pulse
    runtime: python
    plan: free
    disk:
      name: mv-pulse-media
      mountPath: /var/data
      sizeGB: 1
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AUTO_SEED_DEMO_DATA
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: MEDIA_STORAGE_ROOT
        value: /var/data
      - key: SESSION_DAYS
        value: 30
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: mv-pulse-db
          property: connectionString

databases:
  - name: mv-pulse-db
    plan: free